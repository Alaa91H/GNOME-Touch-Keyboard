name: Build and Release GNOME Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev-bin zip

      - name: Compile GSettings Schemas
        run: glib-compile-schemas schemas/

      - name: Package extension
        run: bash scripts/package.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: gnome-touch-keyboard-extension
          path: gnome-touch-keyboard@alaa91h.github.io.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: gnome-touch-keyboard@alaa91h.github.io.zip

