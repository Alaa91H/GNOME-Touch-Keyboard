name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up GJS and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gjs glib-compile-schemas xvfb

      - name: Compile GSettings schema
        run: |
          glib-compile-schemas schemas/

      - name: Run unit tests
        run: |
          gjs tests/unit/LanguageManager.test.js

      - name: Run end‑to‑end test (headless)
        env:
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 3
          gjs tests/e2e/language_switch_e2e.test.js
